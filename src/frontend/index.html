<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bantay Baha - Real-time Monitoring</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Bantay Baha</h1>
    <div class="status-box" id="status">Status: Safe</div>
    <div class="water-level">
      <span id="level">0</span> cm
    </div>
    <div class="thresholds">
      <p><span class="safe">50 cm (Safe)</span></p>
      <p><span class="warning">80 cm (Warning)</span></p>
      <p><span class="danger">100 cm (Danger)</span></p>
    </div>
    <h2>Daily Water Level Analytics</h2>
    <canvas id="chart"></canvas>
  </div>
  <script src="script.js"></script>
</body>
</html>
